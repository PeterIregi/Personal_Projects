<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiboswa HMS — Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">

  <header class="site-header">
    <h1>Kiboswa Medical Center</h1>
    <span class="hdr-right" id="hdr-date"></span>
  </header>

  <nav class="site-nav">
    <a href="/intake">Intake</a>
    <a href="/queue">Queue</a>
    <a href="/records">Records</a>
    <a href="/dashboard">Dashboard</a>
  </nav>

  <div class="stat-row" id="dash-stats">
    <div class="stat"><div class="n">—</div><div class="l">Total Patients</div></div>
    <div class="stat"><div class="n">—</div><div class="l">Active Now</div></div>
    <div class="stat"><div class="n">—</div><div class="l">Today's Visits</div></div>
    <div class="stat"><div class="n">—</div><div class="l">Discharged Today</div></div>
  </div>

  <div class="card">
    <h2>Today's Visits</h2>
    <div id="dash-visits"><span class="spinner"></span> Loading...</div>
  </div>

  <div class="card">
    <h2>Queue by Department</h2>
    <div id="dash-depts"><span class="spinner"></span></div>
  </div>

</div>
<script src="/static/js/app.js"></script>
<script>
async function loadDashboard() {
  const [patients, visits] = await Promise.all([API.patients(), API.visits()]);

  const todayVisits   = visits.filter(v => new Date(v.startedAt).toDateString() === today());
  const active        = visits.filter(v => v.status !== 'discharged');
  const dischargedToday = visits.filter(v => v.status === 'discharged' && new Date(v.startedAt).toDateString() === today());

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat"><div class="n">${patients.length}</div><div class="l">Total Patients</div></div>
    <div class="stat"><div class="n">${active.length}</div><div class="l">Active Now</div></div>
    <div class="stat"><div class="n">${todayVisits.length}</div><div class="l">Today's Visits</div></div>
    <div class="stat"><div class="n">${dischargedToday.length}</div><div class="l">Discharged Today</div></div>`;

  const visitsEl = document.getElementById('dash-visits');
  visitsEl.innerHTML = todayVisits.length
    ? todayVisits.map(v => visitRowHTML(v, 'dashboard')).join('')
    : '<p style="color:#aaa;font-size:13px">No visits today yet.</p>';

  const deptsEl = document.getElementById('dash-depts');
  const deptMap = {};
  active.filter(v => v.status === 'department').forEach(v => {
    deptMap[v.currentDept] = (deptMap[v.currentDept] || 0) + 1;
  });
  const stages = ['triage','consultation','pharmacy'];
  stages.forEach(s => {
    const count = active.filter(v => v.status === s).length;
    if (count) deptMap[statusLabel(s)] = count;
  });
  if (!Object.keys(deptMap).length) {
    deptsEl.innerHTML = '<p style="color:#aaa;font-size:13px">No active patients in departments.</p>';
  } else {
    deptsEl.innerHTML = Object.entries(deptMap).map(([d, n]) => `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <span style="font-size:13px;min-width:140px;color:#555">${d}</span>
        <div style="flex:1;background:#eef4f8;border-radius:4px;height:12px">
          <div style="width:${Math.min(n*40,100)}%;background:#1e88e5;height:12px;border-radius:4px"></div>
        </div>
        <span style="font-size:13px;font-weight:600;color:#1e88e5;min-width:20px">${n}</span>
      </div>`).join('');
  }
}

loadDashboard();
</script>
</body>
</html>
