<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiboswa HMS — Intake</title>
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div class="app">

  <header class="site-header">
    <h1>Kiboswa Medical Center</h1>
    <span class="hdr-right" id="hdr-date"></span>
  </header>

  <nav class="site-nav">
    <a href="/intake">Intake</a>
    <a href="/queue">Queue</a>
    <a href="/records">Records</a>
    <a href="/dashboard">Dashboard</a>
  </nav>

  <div class="card">
    <h2>Patient Intake</h2>
    <div id="intake-msg"></div>
    <div class="form-row three">
      <div class="field">
        <label>Full Name</label>
        <input id="i-name" placeholder="e.g. Jane Doe">
      </div>
      <div class="field">
        <label>Age</label>
        <input id="i-age" type="number" placeholder="e.g. 34" min="0">
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input id="i-phone" placeholder="e.g. 0712345678">
      </div>
    </div>
    <div class="section-actions">
      <button class="btn btn-primary" onclick="intakeSubmit()">Find / Register Patient</button>
    </div>
  </div>

  <div id="intake-found"></div>

</div>
<script src="/static/js/app.js"></script>
<script>
let _allPatients = [];

async function load() {
  _allPatients = await API.patients();
}
load();

async function intakeSubmit() {
  const name  = document.getElementById('i-name').value.trim();
  const age   = document.getElementById('i-age').value.trim();
  const phone = document.getElementById('i-phone').value.trim();
  const msgEl = document.getElementById('intake-msg');
  const found = document.getElementById('intake-found');

  if (!name || !age || !phone) { msg(msgEl, 'Please fill in all three fields.', 'error'); return; }

  _allPatients = await API.patients();

  const exact = _allPatients.find(p =>
    norm(p.name) === norm(name) &&
    String(p.age) === String(age) &&
    norm(p.phone) === norm(phone)
  );

  if (exact) {
    msg(msgEl, 'Patient found — all details match.', 'success');
    showFound(exact);
    return;
  }

  const fuzzy = _allPatients.filter(p => {
    const mn = norm(p.name)  === norm(name);
    const ma = String(p.age) === String(age);
    const mp = norm(p.phone) === norm(phone);
    return [mn, ma, mp].filter(Boolean).length === 2;
  });

  if (fuzzy.length > 0) {
    msg(msgEl, '', '');
    found.innerHTML = '';
    fuzzy.forEach(p => {
      const mn = norm(p.name)  === norm(name);
      const ma = String(p.age) === String(age);
      const mp = norm(p.phone) === norm(phone);
      found.innerHTML += fuzzyCard(p, { name, age, phone }, { mn, ma, mp });
    });
    found.innerHTML += `
      <div class="card">
        <h3 style="margin-bottom:8px">Not the same person?</h3>
        <p style="font-size:13px;color:#555;margin-bottom:12px">If this is a different patient, register them as new.</p>
        <button class="btn btn-primary"
          onclick="registerNew('${encodeURIComponent(name)}','${age}','${encodeURIComponent(phone)}')">
          Register as New Patient
        </button>
      </div>`;
    return;
  }

  msg(msgEl, 'No existing patient found. Registering as new.', 'info');
  const np = await API.createPatient({ name, age: parseInt(age), phone });
  _allPatients.push(np);
  showFound(np);
}

function fuzzyCard(p, entered, m) {
  const rows = [
    { label: 'Full Name', existing: p.name,  entered: entered.name,  match: m.mn },
    { label: 'Age',       existing: p.age,   entered: entered.age,   match: m.ma },
    { label: 'Phone',     existing: p.phone, entered: entered.phone, match: m.mp },
  ].map(f => `<tr>
    <td class="field-label">${f.label}</td>
    <td class="${f.match ? 'match-val' : 'mismatch-val'}">${f.existing}</td>
    <td class="${f.match ? 'match-val' : 'mismatch-val'}">${f.entered}</td>
  </tr>`).join('');

  return `<div class="confirm-box">
    <h3>Possible match found — KMC-${p.pid}</h3>
    <p style="font-size:12px;color:#666;margin-bottom:10px">One detail doesn't match. Please confirm whether this is the same patient.</p>
    <table class="compare-table">
      <thead><tr><th>Field</th><th>On file</th><th>Entered now</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-success" onclick="confirmExisting(${p.pid})">Yes, this is the same patient</button>
      <button class="btn btn-gray"    onclick="this.closest('.confirm-box').style.opacity='.4'">Not this patient</button>
    </div>
  </div>`;
}

function confirmExisting(pid) {
  const p = _allPatients.find(x => x.pid === pid);
  msg(document.getElementById('intake-msg'), `Patient confirmed — KMC-${p.pid}.`, 'success');
  document.getElementById('intake-found').innerHTML = '';
  showFound(p);
}

async function registerNew(name, age, phone) {
  const np = await API.createPatient({ name: decodeURIComponent(name), age: parseInt(age), phone: decodeURIComponent(phone) });
  _allPatients.push(np);
  msg(document.getElementById('intake-msg'), `New patient registered. ID: <strong>KMC-${np.pid}</strong>`, 'info');
  document.getElementById('intake-found').innerHTML = '';
  showFound(np);
}

async function showFound(p) {
  const visits = await API.visits();
  const active = visits.find(v => v.pid === p.pid && v.status !== 'discharged');
  document.getElementById('intake-found').innerHTML = `
    <div class="card">
      <h2>Patient — KMC-${p.pid}</h2>
      <div class="form-row three">
        <div class="field"><label>Name</label><input value="${p.name}" readonly style="background:#f9f9f9"></div>
        <div class="field"><label>Age</label><input value="${p.age}" readonly style="background:#f9f9f9"></div>
        <div class="field"><label>Phone</label><input value="${p.phone}" readonly style="background:#f9f9f9"></div>
      </div>
      <p style="font-size:12px;color:#888">Registered: ${fmt(p.registeredAt)}</p>
      ${active
        ? `<div class="msg msg-warn" style="margin-top:10px">Active visit V-${active.vid} already exists.
             <a href="/visit?vid=${active.vid}&back=intake" class="btn btn-primary btn-sm" style="margin-left:10px">Open Visit</a></div>`
        : `<div class="section-actions"><button class="btn btn-success" onclick="startVisit(${p.pid})">Send to Triage</button></div>`}
    </div>`;
}

async function startVisit(pid) {
  const patients = await API.patients();
  const p = patients.find(x => x.pid === pid);
  const v = await API.createVisit({
    pid, patientName: p.name, patientAge: p.age, patientPhone: p.phone,
    status: 'triage',
    timeline: [{ event: 'Patient registered/identified and sent to triage', time: now() }],
    vitals: {}, notes: [], drugs: [], dispensed: [], departments: [],
    consultationNotes: '', disposition: ''
  });
  document.getElementById('intake-found').innerHTML = `
    <div class="card">
      <div class="msg msg-success">Visit V-${v.vid} created. Patient is now in Triage.
        <a href="/visit?vid=${v.vid}&back=intake" class="btn btn-primary btn-sm" style="margin-left:10px">Open Visit</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
