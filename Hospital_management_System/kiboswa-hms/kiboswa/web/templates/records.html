<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiboswa HMS — Records</title>
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div class="app">

  <header class="site-header">
    <h1>Kiboswa Medical Center</h1>
    <span class="hdr-right" id="hdr-date"></span>
  </header>

  <nav class="site-nav">
    <a href="/intake">Intake</a>
    <a href="/queue">Queue</a>
    <a href="/records">Records</a>
    <a href="/dashboard">Dashboard</a>
  </nav>

  <!-- Patient list view -->
  <div id="view-list">
    <div class="card">
      <h2>All Patient Records</h2>
      <div class="search-bar">
        <input id="rec-search" placeholder="Search by name or patient ID..." oninput="renderRecords()">
      </div>
      <div id="rec-list"><span class="spinner"></span> Loading...</div>
    </div>
  </div>

  <!-- Single patient detail view (shown when ?pid= is in URL) -->
  <div id="view-detail" style="display:none">
    <a href="/records" class="btn btn-gray" style="margin-bottom:12px;display:inline-block">← All Records</a>
    <div id="detail-body"></div>
  </div>

</div>
<script src="/static/js/app.js"></script>
<script>
let _patients = [];
let _visits   = [];

async function loadAll() {
  [_patients, _visits] = await Promise.all([API.patients(), API.visits()]);
  const pid = parseInt(new URLSearchParams(location.search).get('pid'));
  if (pid) {
    document.getElementById('view-list').style.display   = 'none';
    document.getElementById('view-detail').style.display = 'block';
    renderPatientDetail(pid);
  } else {
    renderRecords();
  }
}

function renderRecords() {
  const q = document.getElementById('rec-search').value.toLowerCase();
  const filtered = _patients.filter(p =>
    !q || p.name.toLowerCase().includes(q) || String(p.pid).includes(q)
  );
  const el = document.getElementById('rec-list');
  if (!filtered.length) {
    el.innerHTML = '<p style="color:#aaa;font-size:13px">No patients found.</p>';
    return;
  }
  el.innerHTML = filtered.map(p => patientRowHTML(p, _visits)).join('');
}

function renderPatientDetail(pid) {
  const p = _patients.find(x => x.pid === pid);
  if (!p) { document.getElementById('detail-body').innerHTML = '<div class="card">Patient not found.</div>'; return; }
  const pv = _visits.filter(v => v.pid === pid);
  document.getElementById('detail-body').innerHTML = `
    <div class="card">
      <h2>Patient Record — KMC-${p.pid}</h2>
      <div class="form-row three">
        <div class="field"><label>Name</label><input value="${p.name}" readonly style="background:#f9f9f9"></div>
        <div class="field"><label>Age</label><input value="${p.age}" readonly style="background:#f9f9f9"></div>
        <div class="field"><label>Phone</label><input value="${p.phone}" readonly style="background:#f9f9f9"></div>
      </div>
      <p style="font-size:12px;color:#888">Registered: ${fmt(p.registeredAt)}</p>
      <h3 style="margin-top:16px">Visit History (${pv.length})</h3>
      ${pv.length
        ? pv.map(v => `<div class="patient-row" onclick="location.href='/visit?vid=${v.vid}&back=records'">
            <div class="info">
              <span class="name">V-${v.vid} · ${fmt(v.startedAt)}</span>
              <span class="sub">${statusLabel(v.status)}${v.disposition ? ' · ' + v.disposition : ''}</span>
            </div>
            <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
          </div>`).join('')
        : '<p style="color:#aaa;font-size:13px">No visits yet.</p>'}
    </div>`;
}

loadAll();
</script>
</body>
</html>
