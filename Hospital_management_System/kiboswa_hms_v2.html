
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef4f8;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
header{background:#1e88e5;color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600}
header span{font-size:12px;opacity:.8}
.nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.nav button{padding:8px 14px;border:1.5px solid #1e88e5;background:#fff;color:#1e88e5;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.nav button.active,.nav button:hover{background:#1e88e5;color:#fff}
.card{background:#fff;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,.08);padding:24px;margin-bottom:16px}
h2{font-size:16px;font-weight:600;color:#1e88e5;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #e0e0e0}
h3{font-size:14px;font-weight:600;color:#333;margin-bottom:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#555;font-weight:500}
input,select,textarea{padding:9px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;width:100%}
input:focus,select:focus{outline:none;border-color:#1e88e5}
input.mismatch{border-color:#fb8c00;background:#fff8f0}
input.match{border-color:#43a047;background:#f1f8f0}
.btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:#1e88e5;color:#fff}
.btn-primary:hover{background:#1565c0}
.btn-success{background:#43a047;color:#fff}
.btn-success:hover{background:#2e7d32}
.btn-warn{background:#fb8c00;color:#fff}
.btn-warn:hover{background:#e65100}
.btn-danger{background:#e53935;color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-gray{background:#eee;color:#333}
.btn-gray:hover{background:#ddd}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-red{background:#ffebee;color:#c62828}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
.badge-teal{background:#e0f7fa;color:#00695c}
.badge-gray{background:#f5f5f5;color:#616161}
.patient-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:0.5px solid #e0e0e0;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
.patient-row:hover{background:#f5f9ff;border-color:#90caf9}
.patient-row .info{display:flex;flex-direction:column;gap:2px}
.patient-row .name{font-size:13px;font-weight:600;color:#222}
.patient-row .sub{font-size:11px;color:#777}
.msg{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px}
.msg-success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.msg-warn{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
.msg-info{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
.msg-error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.vitals-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.vital-card{background:#f5f9ff;border:0.5px solid #bbdefb;border-radius:8px;padding:10px;text-align:center}
.vital-card .val{font-size:18px;font-weight:600;color:#1e88e5}
.vital-card .lbl{font-size:10px;color:#777;margin-top:2px}
.dept-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.dept-btn{padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#333;transition:.15s;text-align:center}
.dept-btn:hover{border-color:#1e88e5;color:#1e88e5;background:#f0f7ff}
.dept-btn.selected{border-color:#1e88e5;background:#e3f2fd;color:#1565c0}
.timeline{border-left:2px solid #e0e0e0;padding-left:14px;margin-top:8px}
.tl-item{position:relative;margin-bottom:12px;font-size:12px;color:#555}
.tl-item::before{content:'';position:absolute;left:-19px;top:4px;width:8px;height:8px;border-radius:50%;background:#1e88e5}
.tl-item .tl-time{font-size:10px;color:#aaa}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:8px;padding:14px;text-align:center;border:0.5px solid #e0e0e0}
.stat .n{font-size:24px;font-weight:600;color:#1e88e5}
.stat .l{font-size:11px;color:#888;margin-top:2px}
.section-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.note-list{list-style:none;padding:0}
.note-list li{font-size:12px;color:#555;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.drug-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.drug-row input{flex:1}
.confirm-box{border:1.5px solid #fb8c00;border-radius:8px;background:#fffbf5;padding:16px;margin-bottom:12px}
.confirm-box h3{color:#e65100;margin-bottom:10px}
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.compare-table th{text-align:left;font-size:11px;color:#888;font-weight:500;padding:4px 8px;border-bottom:1px solid #eee}
.compare-table td{padding:6px 8px;border-bottom:0.5px solid #f5f5f5}
.compare-table .field-label{color:#555;font-weight:500}
.compare-table .mismatch-val{color:#e65100;font-weight:600}
.compare-table .match-val{color:#2e7d32}
.hidden{display:none}
</style>

<div class="app">
<header>
  <h1>Kiboswa Medical Center — HMS</h1>
  <span id="hdr-date"></span>
</header>

<div class="nav" id="nav">
  <button class="active" onclick="page('intake')">Intake</button>
  <button onclick="page('queue')">Queue</button>
  <button onclick="page('records')">Records</button>
  <button onclick="page('dashboard')">Dashboard</button>
</div>

<div id="pg-intake">
  <div class="card">
    <h2>Patient Intake</h2>
    <div id="intake-msg"></div>
    <div class="form-row three">
      <div class="field"><label>Full Name</label><input id="i-name" placeholder="e.g. Jane Doe"></div>
      <div class="field"><label>Age</label><input id="i-age" type="number" placeholder="e.g. 34" min="0"></div>
      <div class="field"><label>Phone Number</label><input id="i-phone" placeholder="e.g. 0712345678"></div>
    </div>
    <div class="section-actions">
      <button class="btn btn-primary" onclick="intakeSubmit()">Find / Register Patient</button>
    </div>
  </div>
  <div id="intake-found"></div>
</div>

<div id="pg-queue" class="hidden">
  <div class="card">
    <h2>Active Queue</h2>
    <div id="queue-list"></div>
  </div>
</div>

<div id="pg-records" class="hidden">
  <div class="card">
    <h2>All Patient Records</h2>
    <div class="search-bar">
      <input id="rec-search" placeholder="Search by name or ID..." oninput="renderRecords()">
    </div>
    <div id="rec-list"></div>
  </div>
</div>

<div id="pg-dashboard" class="hidden">
  <div class="stat-row" id="dash-stats"></div>
  <div class="card">
    <h2>Today's Visits</h2>
    <div id="dash-visits"></div>
  </div>
</div>

<div id="pg-detail" class="hidden">
  <button class="btn btn-gray" style="margin-bottom:12px" onclick="backFromDetail()">← Back</button>
  <div id="detail-body"></div>
</div>
</div>

<script>
const DB={
  patients:()=>JSON.parse(localStorage.getItem('kmc_patients')||'[]'),
  visits:()=>JSON.parse(localStorage.getItem('kmc_visits')||'[]'),
  saveP(p){localStorage.setItem('kmc_patients',JSON.stringify(p))},
  saveV(v){localStorage.setItem('kmc_visits',JSON.stringify(v))},
  nextPid(){const p=DB.patients();return p.length?Math.max(...p.map(x=>x.pid))+1:1001},
  nextVid(){const v=DB.visits();return v.length?Math.max(...v.map(x=>x.vid))+1:5001},
};

const DEFAULTS={temp:'37.0',bp:'120/80',pulse:'72',spo2:'98',rr:'16',weight:''};
const DEPTS=['Radiology','Laboratory','Cardiology','Orthopaedics','ENT','Gynaecology','Ophthalmology','Neurology','Dental'];
let detailBackPage='queue';
let deptNextChoice='pharmacy';

function ts(){return new Date().toISOString();}
function fmt(iso){const d=new Date(iso);return d.toLocaleDateString('en-KE',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});}
function today(){return new Date().toDateString();}

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function page(id){
  ['intake','queue','records','dashboard','detail'].forEach(p=>document.getElementById('pg-'+p).classList.add('hidden'));
  document.getElementById('pg-'+id).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  const map={intake:0,queue:1,records:2,dashboard:3};
  if(map[id]!==undefined)document.querySelectorAll('.nav button')[map[id]].classList.add('active');
  if(id==='queue')renderQueue();
  if(id==='records')renderRecords();
  if(id==='dashboard')renderDashboard();
}

function msg(el,text,type){el.innerHTML=text?`<div class="msg msg-${type}">${text}</div>`:''}

function norm(s){return String(s).trim().toLowerCase();}

function intakeSubmit(){
  const name=document.getElementById('i-name').value.trim();
  const age=document.getElementById('i-age').value.trim();
  const phone=document.getElementById('i-phone').value.trim();
  const el=document.getElementById('intake-msg');
  const found=document.getElementById('intake-found');
  if(!name||!age||!phone){msg(el,'Please fill in all three fields.','error');return;}

  const patients=DB.patients();

  const exact=patients.find(p=>
    norm(p.name)===norm(name)&&
    String(p.age)===String(age)&&
    norm(p.phone)===norm(phone)
  );

  if(exact){
    msg(el,'Patient found — all details match.','success');
    showIntakeFound(exact,false);
    return;
  }

  const fuzzyMatches=patients.filter(p=>{
    const matchName=norm(p.name)===norm(name);
    const matchAge=String(p.age)===String(age);
    const matchPhone=norm(p.phone)===norm(phone);
    const matched=[matchName,matchAge,matchPhone].filter(Boolean).length;
    return matched===2;
  });

  if(fuzzyMatches.length>0){
    msg(el,'','');
    found.innerHTML='';
    fuzzyMatches.forEach(p=>{
      const matchName=norm(p.name)===norm(name);
      const matchAge=String(p.age)===String(age);
      const matchPhone=norm(p.phone)===norm(phone);
      found.innerHTML+=renderFuzzyConfirm(p,{name,age,phone},{matchName,matchAge,matchPhone});
    });
    found.innerHTML+=`<div class="card">
      <h3 style="margin-bottom:8px">Not the same person?</h3>
      <p style="font-size:13px;color:#555;margin-bottom:12px">If this is a different patient, register them as new.</p>
      <button class="btn btn-primary" onclick="registerNew('${encodeData(name)}','${age}','${encodeData(phone)}')">Register as New Patient</button>
    </div>`;
    return;
  }

  msg(el,`No existing patient found. Registering as new.`,'info');
  const np=doRegister(name,age,phone);
  showIntakeFound(np,true);
}

function encodeData(s){return encodeURIComponent(s);}
function decodeData(s){return decodeURIComponent(s);}

function renderFuzzyConfirm(p,entered,matches){
  const fields=[
    {key:'name',label:'Full Name',existing:p.name,entered:entered.name,match:matches.matchName},
    {key:'age',label:'Age',existing:p.age,entered:entered.age,match:matches.matchAge},
    {key:'phone',label:'Phone',existing:p.phone,entered:entered.phone,match:matches.matchPhone},
  ];
  const rows=fields.map(f=>`<tr>
    <td class="field-label">${f.label}</td>
    <td class="${f.match?'match-val':'mismatch-val'}">${f.existing}</td>
    <td class="${f.match?'match-val':'mismatch-val'}">${f.entered}</td>
  </tr>`).join('');
  return`<div class="confirm-box">
    <h3>Possible match found — KMC-${p.pid}</h3>
    <p style="font-size:12px;color:#666;margin-bottom:10px">One detail doesn't match. Please confirm whether this is the same patient.</p>
    <table class="compare-table">
      <thead><tr><th>Field</th><th>On file</th><th>Entered now</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-success" onclick="confirmExisting(${p.pid})">Yes, this is the same patient</button>
      <button class="btn btn-gray" onclick="this.closest('.confirm-box').style.opacity='0.4'">Not this patient</button>
    </div>
  </div>`;
}

function confirmExisting(pid){
  const patients=DB.patients();
  const p=patients.find(x=>x.pid===pid);
  msg(document.getElementById('intake-msg'),`Patient confirmed — KMC-${p.pid}.`,'success');
  document.getElementById('intake-found').innerHTML='';
  showIntakeFound(p,false);
}

function registerNew(name,age,phone){
  const np=doRegister(decodeData(name),age,decodeData(phone));
  msg(document.getElementById('intake-msg'),`New patient registered. ID assigned: <strong>KMC-${np.pid}</strong>`,'info');
  document.getElementById('intake-found').innerHTML='';
  showIntakeFound(np,true);
}

function doRegister(name,age,phone){
  const patients=DB.patients();
  const np={pid:DB.nextPid(),name,age:parseInt(age),phone,registeredAt:ts()};
  patients.push(np);DB.saveP(patients);
  return np;
}

function showIntakeFound(p,isNew){
  const found=document.getElementById('intake-found');
  const visits=DB.visits();
  const activeVisit=visits.find(v=>v.pid===p.pid&&v.status!=='discharged');
  found.innerHTML=`
  <div class="card">
    <h2>Patient — KMC-${p.pid}</h2>
    <div class="form-row three">
      <div class="field"><label>Name</label><input value="${p.name}" readonly style="background:#f9f9f9"></div>
      <div class="field"><label>Age</label><input value="${p.age}" readonly style="background:#f9f9f9"></div>
      <div class="field"><label>Phone</label><input value="${p.phone}" readonly style="background:#f9f9f9"></div>
    </div>
    <p style="font-size:12px;color:#888">Registered: ${fmt(p.registeredAt)}</p>
    ${activeVisit
      ?`<div class="msg msg-warn" style="margin-top:10px">This patient already has an active visit (V-${activeVisit.vid}). <button class="btn btn-primary" style="margin-left:10px;padding:4px 10px;font-size:12px" onclick="openDetail(${activeVisit.vid},'intake')">Open Visit</button></div>`
      :`<div class="section-actions"><button class="btn btn-success" onclick="startVisit(${p.pid})">Send to Triage</button></div>`}
  </div>`;
}

function startVisit(pid){
  const patients=DB.patients();
  const p=patients.find(x=>x.pid===pid);
  const visits=DB.visits();
  const v={vid:DB.nextVid(),pid,patientName:p.name,patientAge:p.age,patientPhone:p.phone,status:'triage',startedAt:ts(),timeline:[{event:'Patient registered/identified and sent to triage',time:ts()}],vitals:{},notes:[],drugs:[],departments:[],consultationNotes:'',disposition:''};
  visits.push(v);DB.saveV(visits);
  document.getElementById('intake-found').innerHTML=`<div class="card"><div class="msg msg-success">Visit V-${v.vid} created. Patient is now in Triage. <button class="btn btn-primary" style="margin-left:10px;padding:4px 10px;font-size:12px" onclick="openDetail(${v.vid},'intake')">Open Visit</button></div></div>`;
}

function renderQueue(){
  const visits=DB.visits().filter(v=>v.status!=='discharged');
  const el=document.getElementById('queue-list');
  if(!visits.length){el.innerHTML='<p style="color:#aaa;font-size:13px">No active patients in queue.</p>';return;}
  const order=['triage','consultation','department','pharmacy'];
  visits.sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status));
  el.innerHTML=visits.map(v=>`
    <div class="patient-row" onclick="openDetail(${v.vid},'queue')">
      <div class="info">
        <span class="name">KMC-${v.pid} — ${v.patientName}</span>
        <span class="sub">Age ${v.patientAge} · V-${v.vid} · Started ${fmt(v.startedAt)}</span>
      </div>
      <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
    </div>`).join('');
}

function renderRecords(){
  const q=(document.getElementById('rec-search')||{value:''}).value.toLowerCase();
  const patients=DB.patients().filter(p=>!q||p.name.toLowerCase().includes(q)||String(p.pid).includes(q));
  const visits=DB.visits();
  const el=document.getElementById('rec-list');
  if(!patients.length){el.innerHTML='<p style="color:#aaa;font-size:13px">No patients found.</p>';return;}
  el.innerHTML=patients.map(p=>{
    const pv=visits.filter(v=>v.pid===p.pid);
    const active=pv.find(v=>v.status!=='discharged');
    return`<div class="patient-row" onclick="openPatientRecord(${p.pid})">
      <div class="info">
        <span class="name">KMC-${p.pid} — ${p.name}</span>
        <span class="sub">Age ${p.age} · ${p.phone} · ${pv.length} visit(s)</span>
      </div>
      ${active?`<span class="badge badge-orange">Active</span>`:`<span class="badge badge-gray">${pv.length?'Past visits':'New'}</span>`}
    </div>`;}).join('');
}

function renderDashboard(){
  const visits=DB.visits();
  const patients=DB.patients();
  const todayV=visits.filter(v=>new Date(v.startedAt).toDateString()===today());
  const active=visits.filter(v=>v.status!=='discharged');
  const discharged=visits.filter(v=>v.status==='discharged'&&new Date(v.startedAt).toDateString()===today());
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="n">${patients.length}</div><div class="l">Total Patients</div></div>
    <div class="stat"><div class="n">${active.length}</div><div class="l">Active Now</div></div>
    <div class="stat"><div class="n">${todayV.length}</div><div class="l">Today's Visits</div></div>
    <div class="stat"><div class="n">${discharged.length}</div><div class="l">Discharged Today</div></div>`;
  document.getElementById('dash-visits').innerHTML=todayV.length?todayV.map(v=>`
    <div class="patient-row" onclick="openDetail(${v.vid},'dashboard')">
      <div class="info"><span class="name">KMC-${v.pid} — ${v.patientName}</span><span class="sub">V-${v.vid} · ${fmt(v.startedAt)}</span></div>
      <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
    </div>`).join(''):'<p style="color:#aaa;font-size:13px">No visits today yet.</p>';
}

function statusBadge(s){return{triage:'badge-orange',consultation:'badge-blue',department:'badge-purple',pharmacy:'badge-teal',discharged:'badge-green'}[s]||'badge-gray';}
function statusLabel(s){return{triage:'Triage',consultation:'Consultation',department:'In Department',pharmacy:'Pharmacy',discharged:'Discharged'}[s]||s;}

function openPatientRecord(pid){
  const patients=DB.patients();
  const p=patients.find(x=>x.pid===pid);
  const visits=DB.visits().filter(v=>v.pid===pid);
  ['intake','queue','records','dashboard'].forEach(pg=>document.getElementById('pg-'+pg).classList.add('hidden'));
  document.getElementById('pg-detail').classList.remove('hidden');
  detailBackPage='records';
  document.getElementById('detail-body').innerHTML=`
  <div class="card">
    <h2>Patient Record — KMC-${p.pid}</h2>
    <div class="form-row three">
      <div class="field"><label>Name</label><input value="${p.name}" readonly style="background:#f9f9f9"></div>
      <div class="field"><label>Age</label><input value="${p.age}" readonly style="background:#f9f9f9"></div>
      <div class="field"><label>Phone</label><input value="${p.phone}" readonly style="background:#f9f9f9"></div>
    </div>
    <p style="font-size:12px;color:#888">Registered: ${fmt(p.registeredAt)}</p>
    <h3 style="margin-top:16px">Visit History (${visits.length})</h3>
    ${visits.length?visits.map(v=>`<div class="patient-row" onclick="openDetail(${v.vid},'records')">
      <div class="info"><span class="name">V-${v.vid} · ${fmt(v.startedAt)}</span><span class="sub">${statusLabel(v.status)}${v.disposition?' · '+v.disposition:''}</span></div>
      <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
    </div>`).join(''):'<p style="color:#aaa;font-size:13px">No visits yet.</p>'}
  </div>`;
}

function openDetail(vid,back){
  detailBackPage=back||'queue';
  ['intake','queue','records','dashboard'].forEach(pg=>document.getElementById('pg-'+pg).classList.add('hidden'));
  document.getElementById('pg-detail').classList.remove('hidden');
  renderDetail(vid);
}

function backFromDetail(){
  document.getElementById('pg-detail').classList.add('hidden');
  page(detailBackPage);
}

function getVisit(vid){return DB.visits().find(v=>v.vid===vid);}

function saveVisit(v){
  const visits=DB.visits();
  const i=visits.findIndex(x=>x.vid===v.vid);
  visits[i]=v;DB.saveV(visits);
}

function renderDetail(vid){
  const v=getVisit(vid);
  if(!v){document.getElementById('detail-body').innerHTML='<div class="card">Visit not found.</div>';return;}
  const sections={triage:renderTriage,consultation:renderConsultation,department:renderDepartment,pharmacy:renderPharmacy,discharged:renderDischarged};
  const fn=sections[v.status]||renderTriage;
  document.getElementById('detail-body').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <h2 style="border:0;padding:0;margin:0">V-${v.vid} — ${v.patientName}</h2>
          <p style="font-size:11px;color:#888;margin-top:2px">KMC-${v.pid} · Age ${v.patientAge} · ${v.patientPhone}</p>
        </div>
        <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
      </div>
      <div class="timeline">${renderTimeline(v)}</div>
    </div>
    <div id="stage-section">${fn(v)}</div>`;
}

function renderTimeline(v){
  return v.timeline.map(t=>`<div class="tl-item"><strong style="font-size:12px">${t.event}</strong><br><span class="tl-time">${fmt(t.time)}</span></div>`).join('');
}

function renderTriage(v){
  const d=DEFAULTS;
  return`<div class="card">
    <h2>Triage — Record Vitals</h2>
    <p style="font-size:12px;color:#888;margin-bottom:14px">Leave any field blank to use the default value shown.</p>
    <div class="form-row three">
      <div class="field"><label>Temperature (°C) <span style="color:#aaa">[default: ${d.temp}]</span></label><input id="v-temp" placeholder="${d.temp}"></div>
      <div class="field"><label>Blood Pressure <span style="color:#aaa">[default: ${d.bp}]</span></label><input id="v-bp" placeholder="${d.bp}"></div>
      <div class="field"><label>Pulse (bpm) <span style="color:#aaa">[default: ${d.pulse}]</span></label><input id="v-pulse" placeholder="${d.pulse}"></div>
    </div>
    <div class="form-row three">
      <div class="field"><label>SpO₂ (%) <span style="color:#aaa">[default: ${d.spo2}]</span></label><input id="v-spo2" placeholder="${d.spo2}"></div>
      <div class="field"><label>Resp. Rate <span style="color:#aaa">[default: ${d.rr}]</span></label><input id="v-rr" placeholder="${d.rr}"></div>
      <div class="field"><label>Weight (kg)</label><input id="v-weight" placeholder="optional"></div>
    </div>
    <div class="field" style="margin-bottom:12px"><label>Chief Complaint / Notes</label><textarea id="v-notes" rows="2" placeholder="Brief description of presenting complaint..."></textarea></div>
    <div class="section-actions">
      <button class="btn btn-primary" onclick="submitTriage(${v.vid})">Save Vitals & Send to Consultation</button>
      <button class="btn btn-gray" onclick="submitTriage(${v.vid},true)">Skip Vitals & Send to Consultation</button>
    </div>
  </div>`;
}

function submitTriage(vid,skip){
  const v=getVisit(vid);
  const d=DEFAULTS;
  v.vitals={
    temp:(!skip&&document.getElementById('v-temp').value.trim())||d.temp,
    bp:(!skip&&document.getElementById('v-bp').value.trim())||d.bp,
    pulse:(!skip&&document.getElementById('v-pulse').value.trim())||d.pulse,
    spo2:(!skip&&document.getElementById('v-spo2').value.trim())||d.spo2,
    rr:(!skip&&document.getElementById('v-rr').value.trim())||d.rr,
    weight:(!skip&&document.getElementById('v-weight').value.trim())||'N/A',
    recordedAt:ts()
  };
  const notes=!skip?document.getElementById('v-notes').value.trim():'';
  if(notes)v.notes.push({text:notes,time:ts(),by:'Triage'});
  v.status='consultation';
  v.timeline.push({event:`Vitals recorded${skip?' (defaults used)':''} — sent to Consultation`,time:ts()});
  saveVisit(v);renderDetail(vid);
}

function renderConsultation(v){
  const vt=v.vitals;
  return`<div class="card">
    <h2>Consultation</h2>
    <div class="vitals-grid">
      <div class="vital-card"><div class="val">${vt.temp}°C</div><div class="lbl">Temperature</div></div>
      <div class="vital-card"><div class="val">${vt.bp}</div><div class="lbl">Blood Pressure</div></div>
      <div class="vital-card"><div class="val">${vt.pulse} bpm</div><div class="lbl">Pulse</div></div>
      <div class="vital-card"><div class="val">${vt.spo2}%</div><div class="lbl">SpO₂</div></div>
      <div class="vital-card"><div class="val">${vt.rr}</div><div class="lbl">Resp. Rate</div></div>
      <div class="vital-card"><div class="val">${vt.weight==='N/A'?'—':vt.weight+' kg'}</div><div class="lbl">Weight</div></div>
    </div>
    <div class="field" style="margin-bottom:12px"><label>Consultation Notes / Diagnosis</label><textarea id="c-notes" rows="3" placeholder="Enter findings, diagnosis, treatment plan...">${v.consultationNotes||''}</textarea></div>
    <h3>Prescribe Medications</h3>
    <div id="drug-list">${renderDrugInputs(v)}</div>
    <button class="btn btn-gray" style="margin-bottom:14px;font-size:12px" onclick="addDrug(${v.vid})">+ Add Medication</button>
    <h3>Disposition</h3>
    <div class="form-row" style="margin-bottom:0">
      <div class="field"><label>Select action</label>
        <select id="c-disp">
          <option value="">— choose —</option>
          <option value="pharmacy">Send to Pharmacy</option>
          ${DEPTS.map(d=>`<option value="dept:${d}">Refer to ${d}</option>`).join('')}
          <option value="discharge">Discharge (no meds/referral)</option>
        </select>
      </div>
    </div>
    <div class="section-actions" style="margin-top:12px">
      <button class="btn btn-primary" onclick="submitConsultation(${v.vid})">Confirm & Proceed</button>
    </div>
  </div>`;
}

function renderDrugInputs(v){
  return(v.drugs||[]).map((d,i)=>`<div class="drug-row">
    <input value="${d.drug}" placeholder="Drug name" oninput="updateDrug(event,${v.vid},${i},'drug')">
    <input value="${d.dose}" placeholder="Dose & freq." style="max-width:160px" oninput="updateDrug(event,${v.vid},${i},'dose')">
    <button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="removeDrug(${v.vid},${i})">✕</button>
  </div>`).join('');
}

function addDrug(vid){
  const v=getVisit(vid);v.drugs.push({drug:'',dose:'',addedAt:ts()});saveVisit(v);
  document.getElementById('drug-list').innerHTML=renderDrugInputs(v);
}
function removeDrug(vid,i){
  const v=getVisit(vid);v.drugs.splice(i,1);saveVisit(v);
  document.getElementById('drug-list').innerHTML=renderDrugInputs(v);
}
function updateDrug(ev,vid,i,field){
  const v=getVisit(vid);v.drugs[i][field]=ev.target.value;saveVisit(v);
}

function submitConsultation(vid){
  const v=getVisit(vid);
  const notes=document.getElementById('c-notes').value.trim();
  const disp=document.getElementById('c-disp').value;
  if(!disp){alert('Please select a disposition.');return;}
  v.consultationNotes=notes;
  if(notes)v.notes.push({text:notes,time:ts(),by:'Doctor'});
  if(disp==='pharmacy'){
    v.status='pharmacy';v.disposition='Sent to Pharmacy';
    v.timeline.push({event:'Consultation complete — sent to Pharmacy',time:ts()});
  } else if(disp.startsWith('dept:')){
    const dept=disp.replace('dept:','');
    v.status='department';v.disposition=`Referred to ${dept}`;v.currentDept=dept;
    v.departments.push({dept,at:ts()});
    v.timeline.push({event:`Referred to ${dept}`,time:ts()});
  } else if(disp==='discharge'){
    v.status='discharged';v.disposition='Discharged after consultation';v.dischargedAt=ts();
    v.timeline.push({event:'Patient discharged after consultation',time:ts()});
  }
  saveVisit(v);renderDetail(vid);
}

function renderDepartment(v){
  return`<div class="card">
    <h2>${v.currentDept||'Department'}</h2>
    <div class="msg msg-info">Patient referred to <strong>${v.currentDept}</strong> for further investigation.</div>
    <div class="field" style="margin-bottom:12px"><label>Department Findings / Report</label><textarea id="dept-notes" rows="3" placeholder="Enter department report, test results..."></textarea></div>
    <h3 style="margin-bottom:8px">After Review — Next Step</h3>
    <div class="dept-grid">
      <div class="dept-btn selected" id="dn-pharmacy" onclick="selectDeptNext('pharmacy')">Send to Pharmacy</div>
      <div class="dept-btn" id="dn-consult" onclick="selectDeptNext('consult')">Back to Consultation</div>
      <div class="dept-btn" id="dn-discharge" onclick="selectDeptNext('discharge')">Discharge</div>
      ${DEPTS.filter(d=>d!==v.currentDept).map(d=>`<div class="dept-btn" id="dn-dept-${d.replace(/\s/g,'')}" onclick="selectDeptNext('dept:${d}')">${d}</div>`).join('')}
    </div>
    <div class="section-actions">
      <button class="btn btn-primary" onclick="submitDepartment(${v.vid})">Confirm & Proceed</button>
    </div>
  </div>`;
}

function selectDeptNext(val){
  deptNextChoice=val;
  document.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('selected'));
  const id='dn-'+(val.startsWith('dept:')?'dept-'+val.replace('dept:','').replace(/\s/g,''):val);
  const el=document.getElementById(id);
  if(el)el.classList.add('selected');
}

function submitDepartment(vid){
  const v=getVisit(vid);
  const notes=document.getElementById('dept-notes').value.trim();
  if(notes)v.notes.push({text:`[${v.currentDept}] ${notes}`,time:ts(),by:v.currentDept});
  const choice=deptNextChoice||'pharmacy';
  if(choice==='pharmacy'){
    v.status='pharmacy';v.disposition='Sent to Pharmacy after '+v.currentDept;
    v.timeline.push({event:`${v.currentDept} report done — sent to Pharmacy`,time:ts()});
  } else if(choice==='consult'){
    v.status='consultation';v.disposition='Returned to Consultation';
    v.timeline.push({event:`${v.currentDept} report done — returned to Consultation`,time:ts()});
  } else if(choice==='discharge'){
    v.status='discharged';v.disposition='Discharged after '+v.currentDept;v.dischargedAt=ts();
    v.timeline.push({event:`Discharged after ${v.currentDept}`,time:ts()});
  } else if(choice.startsWith('dept:')){
    const dept=choice.replace('dept:','');
    v.currentDept=dept;v.departments.push({dept,at:ts()});
    v.timeline.push({event:`Referred to ${dept}`,time:ts()});
  }
  saveVisit(v);renderDetail(vid);
}

function renderPharmacy(v){
  const drugs=v.drugs.filter(d=>d.drug);
  return`<div class="card">
    <h2>Pharmacy</h2>
    ${drugs.length?`<h3>Prescribed Medications</h3><ul class="note-list">${drugs.map(d=>`<li><strong>${d.drug}</strong> — ${d.dose||'no dose specified'}</li>`).join('')}</ul>`:
    '<div class="msg msg-warn">No medications prescribed.</div>'}
    <div class="field" style="margin:14px 0 0"><label>Pharmacist Notes / Substitutions</label><textarea id="ph-notes" rows="2" placeholder="Dispensing notes, substitutions..."></textarea></div>
    <h3 style="margin-top:14px">Resources Dispensed</h3>
    <div id="ph-drug-extra">${renderPharmaDrugs(v)}</div>
    <button class="btn btn-gray" style="margin-bottom:14px;font-size:12px" onclick="addPharmaDrug(${v.vid})">+ Add dispensed item</button>
    <div class="section-actions">
      <button class="btn btn-success" onclick="dischargePatient(${v.vid})">Dispense & Discharge Patient</button>
    </div>
  </div>`;
}

function renderPharmaDrugs(v){
  return(v.dispensed||[]).map((d,i)=>`<div class="drug-row">
    <input value="${d.item}" placeholder="Item / drug dispensed" oninput="updateDispensed(event,${v.vid},${i},'item')">
    <input value="${d.qty}" placeholder="Qty / units" style="max-width:130px" oninput="updateDispensed(event,${v.vid},${i},'qty')">
    <button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="removeDispensed(${v.vid},${i})">✕</button>
  </div>`).join('');
}
function addPharmaDrug(vid){
  const v=getVisit(vid);if(!v.dispensed)v.dispensed=[];v.dispensed.push({item:'',qty:'',at:ts()});saveVisit(v);
  document.getElementById('ph-drug-extra').innerHTML=renderPharmaDrugs(v);
}
function removeDispensed(vid,i){
  const v=getVisit(vid);v.dispensed.splice(i,1);saveVisit(v);
  document.getElementById('ph-drug-extra').innerHTML=renderPharmaDrugs(v);
}
function updateDispensed(ev,vid,i,field){
  const v=getVisit(vid);if(!v.dispensed)v.dispensed=[];v.dispensed[i][field]=ev.target.value;saveVisit(v);
}

function dischargePatient(vid){
  const v=getVisit(vid);
  const notes=document.getElementById('ph-notes').value.trim();
  if(notes)v.notes.push({text:`[Pharmacy] ${notes}`,time:ts(),by:'Pharmacy'});
  v.status='discharged';v.dischargedAt=ts();
  if(!v.disposition)v.disposition='Discharged via Pharmacy';
  v.timeline.push({event:'Medications dispensed — patient discharged',time:ts()});
  saveVisit(v);renderDetail(vid);
}

function renderDischarged(v){
  const drugs=(v.drugs||[]).filter(d=>d.drug);
  const dispensed=v.dispensed||[];
  return`<div class="card">
    <h2>Visit Complete — Discharged</h2>
    <div class="msg msg-success">Patient discharged on ${fmt(v.dischargedAt)}. Disposition: <strong>${v.disposition}</strong></div>
    <h3 style="margin-top:14px">Vitals Summary</h3>
    <div class="vitals-grid">
      <div class="vital-card"><div class="val">${v.vitals.temp||'—'}°C</div><div class="lbl">Temperature</div></div>
      <div class="vital-card"><div class="val">${v.vitals.bp||'—'}</div><div class="lbl">Blood Pressure</div></div>
      <div class="vital-card"><div class="val">${v.vitals.pulse||'—'}</div><div class="lbl">Pulse</div></div>
    </div>
    ${v.consultationNotes?`<h3 style="margin-top:14px">Consultation Notes</h3><p style="font-size:13px;color:#444">${v.consultationNotes}</p>`:''}
    ${drugs.length?`<h3 style="margin-top:14px">Prescribed</h3><ul class="note-list">${drugs.map(d=>`<li>${d.drug} — ${d.dose}</li>`).join('')}</ul>`:''}
    ${dispensed.length?`<h3 style="margin-top:14px">Dispensed Resources</h3><ul class="note-list">${dispensed.map(d=>`<li>${d.item} · ${d.qty}</li>`).join('')}</ul>`:''}
    ${v.departments.length?`<h3 style="margin-top:14px">Departments Visited</h3><ul class="note-list">${v.departments.map(d=>`<li>${d.dept} — ${fmt(d.at)}</li>`).join('')}</ul>`:''}
    ${v.notes.length?`<h3 style="margin-top:14px">All Clinical Notes</h3><ul class="note-list">${v.notes.map(n=>`<li><span style="color:#888;font-size:11px">[${n.by}] ${fmt(n.time)}</span><br>${n.text}</li>`).join('')}</ul>`:''}
  </div>`;
}
</script>
